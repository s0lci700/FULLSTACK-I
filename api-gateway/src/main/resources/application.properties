spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/clientes/**,/api/tipo-cliente/**,/api/suscripciones/**

spring.cloud.gateway.routes[2].id=security-service
spring.cloud.gateway.routes[2].uri=lb://security-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/permisos/**,/api/roles/**

spring.cloud.gateway.routes[3].id=ms-vehiculos
spring.cloud.gateway.routes[3].uri=lb://ms-vehiculos
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/vehiculos/**,/api/tipo-vehiculo/**

spring.cloud.gateway.routes[4].id=ms-espacios
spring.cloud.gateway.routes[4].uri=lb://ms-espacios
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/espacios/**,/api/tipo-espacio/**

spring.cloud.gateway.routes[5].id=ms-reservas
spring.cloud.gateway.routes[5].uri=lb://ms-reservas
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reservas/**

spring.cloud.gateway.routes[6].id=ms-accesos
spring.cloud.gateway.routes[6].uri=lb://ms-accesos
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/accesos/**

spring.cloud.gateway.routes[7].id=ms-tarifas
spring.cloud.gateway.routes[7].uri=lb://ms-tarifas
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/tarifas/**,/api/horarios-tarifa/**

spring.cloud.gateway.routes[8].id=ms-pagos
spring.cloud.gateway.routes[8].uri=lb://ms-pagos
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/pagos/**,/api/cobros/**,/api/metodos-pago/**,/api/bancos/**

spring.cloud.gateway.routes[9].id=ms-reportes
spring.cloud.gateway.routes[9].uri=lb://ms-reportes
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/reportes/**
