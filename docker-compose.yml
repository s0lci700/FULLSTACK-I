    restart: unless-stopped

  # ── Pagos y Reportes ───────────────────────────────────────────────────────
  ms-pagos:
    build:
      context: .
      args:
        JAR_FILE: ms-pagos-0.0.1-SNAPSHOT.jar
    ports:
